<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rung — Legal</title><style>
:root{--bg:#F7F4EF;--surface:#fff;--ink:#1E2A3A;--muted:#5C6675;--accent:#2A7E78;--border:#E7E1D6}
@media(prefers-color-scheme:dark){:root{--bg:#14120F;--surface:#1E1B17;--ink:#F0EEE9;--muted:#B0A99E;--accent:#5BC4BC;--border:#3C362E}}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:720px;margin:0 auto;padding:32px 20px 64px}
header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
header .dot{width:14px;height:14px;border-radius:4px;background:var(--accent)}
header b{font-size:18px;letter-spacing:.2px}
h1{font-size:28px;margin:18px 0 4px}
.updated{color:var(--muted);font-size:14px;margin:0 0 24px}
.intro{color:var(--ink);font-size:17px;margin:0 0 28px}
h2{font-size:19px;margin:28px 0 6px}
p{margin:0 0 14px;color:var(--ink)}
a{color:var(--accent)}
.foot{margin-top:36px;padding-top:18px;border-top:1px solid var(--border);color:var(--muted);font-size:14px}
nav a{margin-right:16px}
</style></head><body><div class="wrap">
<header><span class="dot"></span><b>Rung</b></header>
<h1>Legal</h1>
<p class="intro">Rung is a calm, offline-first practice app for social anxiety.</p>
<nav><a href="privacy.html">Privacy Policy</a><a href="terms.html">Terms of Service</a></nav>
<p class="foot">Questions? <a href="mailto:hello@rung.app">hello@rung.app</a></p>
</div></body></html>
